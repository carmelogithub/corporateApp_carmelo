<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>nosotros</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">nosotros</ion-title>
    </ion-toolbar>
  </ion-header>

  <h2>Cálculo de distancia</h2>
  <h3>Ubicación de las oficinas</h3>
  <p>Latitud: 50</p>
  <p>Longitud:-5</p>

<ion-button (click)="verUbicacion()">Consultar</ion-button>

<p>Latitud actual :{{actualLat}}</p>
<p>Longitud actual :{{actualLon}}</p>

<ion-button (click)="calcularDistancia()">Consultar distancia</ion-button>
<p>distancia a nuestras oficinas :{{distancia}}</p>
</ion-content>
